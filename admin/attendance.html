<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>참석 명단 관리 · 비공개</title>
    <style>
      :root {
        --bg: #f4f5f7; --card: #fff; --ink: #1f2430; --muted: #6b7280;
        --line: #e2e5ea; --green: #2f5d3a; --green-dark: #274d31;
        --blue: #2f5d8a; --red: #b23a3a; --warn: #a5642f;
        --sans: "Malgun Gothic", -apple-system, "Apple SD Gothic Neo", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body { background: var(--bg); color: var(--ink); font: 14px/1.5 var(--sans); }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 16px 14px 60px; }
      .topbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
      .topbar h1 { font-size: 1.15rem; margin: 0; }
      .topbar .who { color: var(--muted); font-size: 0.82rem; }
      .btn { min-height: 38px; padding: 0 14px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink); font: 600 0.85rem/1 var(--sans); cursor: pointer; }
      .btn.primary { background: var(--green-dark); border-color: var(--green-dark); color: #fff; }
      .btn.small { min-height: 30px; padding: 0 10px; font-size: 0.78rem; }
      .btnrow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .notice { font-size: 0.76rem; color: var(--warn); margin: 4px 0 14px; }
      .hidden { display: none !important; }

      /* 게이트(로그인/거부) */
      .gate { max-width: 420px; margin: 60px auto; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 30px 26px; text-align: center; }
      .gate h2 { margin: 0 0 8px; font-size: 1.1rem; }
      .gate p { color: var(--muted); margin: 0 0 18px; font-size: 0.88rem; }
      .gate .btn { width: 100%; min-height: 46px; }
      .gate .err { color: var(--red); font-size: 0.84rem; margin-top: 12px; }

      /* 요약 카드 */
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 12px 0 16px; }
      .stat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px; }
      .stat .label { color: var(--muted); font-size: 0.76rem; }
      .stat .value { font-size: 1.5rem; font-weight: 700; margin-top: 3px; }
      .stat.accent .value { color: var(--green); }
      .stat.blue .value { color: var(--blue); }
      .stat.warn .value { color: var(--warn); }
      .basis { color: var(--muted); font-size: 0.74rem; margin: -6px 0 14px; }

      /* 필터 */
      .filters { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; display: grid; gap: 10px; }
      .filters .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .filters select, .filters input { min-height: 36px; padding: 0 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; font: 400 0.85rem var(--sans); }
      .filters input[type="text"] { flex: 1; min-width: 130px; }
      .chk { display: inline-flex; align-items: center; gap: 6px; font-size: 0.83rem; color: var(--ink); }

      /* 표 */
      .table-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: auto; }
      table { width: 100%; border-collapse: collapse; min-width: 860px; }
      th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; font-size: 0.84rem; }
      th { position: sticky; top: 0; background: #eef0f3; z-index: 1; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
      tr.stale td { background: #fbfbfc; color: var(--muted); }
      .badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
      .badge.att { background: #e7f0e9; color: var(--green); }
      .badge.dec { background: #f3e9e9; color: var(--red); }
      .badge.groom { background: #e9eef5; color: var(--blue); }
      .badge.bride { background: #f6ecec; color: #9a4a6a; }
      .badge.latest { background: #eef4ec; color: var(--green-dark); }
      .badge.old { background: #eee; color: var(--muted); }
      .badge.dup { background: #f7efe3; color: var(--warn); }
      .phone-cell { white-space: nowrap; }
      .phone-cell .reveal { margin-left: 6px; }
      .msg { max-width: 220px; }
      .msg .full { display: none; }
      .msg.open .short { display: none; }
      .msg.open .full { display: inline; }
      .link { color: var(--blue); cursor: pointer; font-size: 0.78rem; background: none; border: 0; padding: 0; }

      .state { padding: 40px 16px; text-align: center; color: var(--muted); }
      .skel { height: 14px; background: linear-gradient(90deg,#eee,#f5f5f5,#eee); border-radius: 6px; margin: 8px 0; animation: sh 1.2s infinite; }
      @keyframes sh { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }

      /* 모바일 카드 */
      .cards-mobile { display: none; }
      @media (max-width: 720px) {
        .table-wrap { display: none; }
        .cards-mobile { display: grid; gap: 10px; }
        .rc { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; }
        .rc.stale { opacity: 0.72; }
        .rc .rc-head { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
        .rc .rc-line { font-size: 0.85rem; margin: 2px 0; }
        .rc .rc-k { color: var(--muted); display: inline-block; min-width: 58px; }
      }
    </style>
  </head>
  <body>
    <!-- 로딩 -->
    <div class="gate" data-view="loading">
      <h2>불러오는 중…</h2>
      <div class="skel"></div><div class="skel"></div>
    </div>

    <!-- 로그인 -->
    <div class="gate hidden" data-view="login">
      <h2>참석 명단 관리</h2>
      <p>신랑·신부 전용 비공개 화면입니다.<br />Google 계정으로 로그인해 주세요.</p>
      <button class="btn primary" data-login>Google로 로그인</button>
      <p class="err hidden" data-login-err></p>
    </div>

    <!-- 접근 거부 -->
    <div class="gate hidden" data-view="denied">
      <h2>접근 권한이 없습니다</h2>
      <p data-denied-msg>허용된 관리자 계정이 아닙니다.</p>
      <button class="btn" data-logout2>다른 계정으로 로그인</button>
    </div>

    <!-- 대시보드 -->
    <div class="wrap hidden" data-view="dashboard">
      <div class="topbar">
        <div>
          <h1>참석 명단 관리</h1>
          <span class="who" data-who></span>
        </div>
        <div class="btnrow">
          <span class="who" data-refreshed></span>
          <button class="btn small" data-refresh>새로고침</button>
          <button class="btn small" data-csv>CSV 내려받기</button>
          <button class="btn small" data-logout>로그아웃</button>
        </div>
      </div>
      <p class="notice">이 화면에는 하객의 이름과 연락처가 포함됩니다. 공용 PC·화면 캡처·공유에 주의해 주세요.</p>

      <div class="cards" data-cards></div>
      <p class="basis">참석·불참·예상 인원은 <b>최신 응답 기준</b>(같은 연락처는 가장 최근 응답 1건)으로 집계합니다. ‘전체 응답 건수’만 원본 전체 기준입니다.</p>

      <div class="filters">
        <div class="row">
          <select data-f-status>
            <option value="">참석 여부 전체</option>
            <option value="attending">참석</option>
            <option value="not_attending">불참</option>
          </select>
          <select data-f-side>
            <option value="">신랑/신부측 전체</option>
            <option value="groom">신랑측</option>
            <option value="bride">신부측</option>
          </select>
          <input type="text" data-f-name placeholder="이름 검색(대표자·참석자)" />
          <input type="text" data-f-phone placeholder="연락처 뒤 4자리" inputmode="numeric" maxlength="4" style="max-width:130px" />
        </div>
        <div class="row">
          <label class="chk"><input type="checkbox" data-f-latest checked /> 최신 응답만</label>
          <label class="chk"><input type="checkbox" data-f-dup /> 중복 가능만</label>
          <span class="who" data-count></span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>제출 일시</th><th>참석</th><th>구분</th><th>대표자</th><th>연락처</th>
              <th>인원</th><th>참석자 이름</th><th>전달사항</th><th>상태</th>
            </tr>
          </thead>
          <tbody data-tbody></tbody>
        </table>
      </div>
      <div class="cards-mobile" data-mobile></div>
      <div class="state hidden" data-empty>조건에 맞는 응답이 없습니다.</div>
      <div class="state hidden" data-error></div>
    </div>

    <script type="module">
      import { firebaseConfig } from "../firebase-config.js";
      const V = "10.14.1";
      const ADMIN_ALLOW = ["zzangseeyoung@gmail.com"]; // 규칙(isRsvpAdmin)에서도 강제됨 — 여기선 UX용
      const $ = (s, r = document) => r.querySelector(s);
      const $$ = (s, r = document) => [...r.querySelectorAll(s)];
      const views = {};
      $$("[data-view]").forEach((el) => (views[el.dataset.view] = el));
      const show = (name) => Object.entries(views).forEach(([k, el]) => el.classList.toggle("hidden", k !== name));

      let app, auth, db, fs, authMod;
      let rows = [];          // 가공된 응답 목록
      const revealed = new Set(); // 연락처 보기 상태(메모리 전용)

      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
      const normPhone = (p) => String(p || "").replace(/[^0-9]/g, "");
      function maskPhone(p) {
        const d = normPhone(p);
        if (d.length < 7) return d || "-";
        return d.slice(0, 3) + "-****-" + d.slice(-4);
      }
      function fmtPhone(p) {
        const d = normPhone(p);
        if (d.length === 11) return d.slice(0, 3) + "-" + d.slice(3, 7) + "-" + d.slice(7);
        if (d.length === 10) return d.slice(0, 3) + "-" + d.slice(3, 6) + "-" + d.slice(6);
        return d;
      }
      const dtf = new Intl.DateTimeFormat("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", hourCycle: "h23" });
      function fmtDate(d) { return d ? dtf.format(d) : "-"; }

      async function initFirebase() {
        const [appMod, aMod, fMod] = await Promise.all([
          import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`),
          import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`),
          import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`),
        ]);
        app = appMod.initializeApp(firebaseConfig);
        authMod = aMod;
        auth = aMod.getAuth(app);
        fs = fMod;
        db = fMod.getFirestore(app);
      }

      async function doLogin() {
        $("[data-login-err]").classList.add("hidden");
        try {
          const provider = new authMod.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          await authMod.signInWithPopup(auth, provider);
        } catch (e) {
          const msg = e.code === "auth/popup-blocked"
            ? "팝업이 차단되었습니다. 팝업 허용 후 다시 시도해 주세요."
            : e.code === "auth/operation-not-allowed"
            ? "Google 로그인이 아직 활성화되지 않았습니다. (Firebase 콘솔에서 사용 설정 필요)"
            : e.code === "auth/unauthorized-domain"
            ? "이 도메인이 승인되지 않았습니다. (Firebase 콘솔 Authentication 승인 도메인에 추가 필요)"
            : "로그인에 실패했습니다. 다시 시도해 주세요.";
          const el = $("[data-login-err]"); el.textContent = msg; el.classList.remove("hidden");
        }
      }

      function isAllowed(user) {
        return !!user && user.emailVerified === true && ADMIN_ALLOW.includes((user.email || "").toLowerCase());
      }

      async function loadData() {
        show("dashboard");
        $("[data-error]").classList.add("hidden");
        $("[data-tbody]").innerHTML = '<tr><td colspan="9"><div class="skel"></div><div class="skel"></div></td></tr>';
        try {
          const q = fs.query(fs.collection(db, "rsvp_submissions"), fs.orderBy("created_at", "desc"));
          const snap = await fs.getDocs(q);
          const raw = snap.docs.map((d) => {
            const x = d.data();
            const ca = x.created_at && x.created_at.toDate ? x.created_at.toDate() : null;
            return {
              id: d.id, status: x.status, side: x.side, name: x.respondent_name || "",
              phone: x.phone || "", party: x.party_size || 0,
              attendees: Array.isArray(x.attendees) ? x.attendees.map((a) => a && a.name).filter(Boolean) : [],
              message: x.message || "", created: ca,
            };
          });
          // 중복/최신 판정: 정규화 phone 그룹 내 created 최신이 유효
          const groups = {};
          raw.forEach((r) => { const k = normPhone(r.phone) || ("__id_" + r.id); (groups[k] ||= []).push(r); });
          Object.values(groups).forEach((g) => {
            g.sort((a, b) => (b.created?.getTime() || 0) - (a.created?.getTime() || 0));
            g.forEach((r, i) => { r.isLatest = i === 0; r.dupGroupSize = g.length; r.dupKey = normPhone(r.phone) || r.id; });
          });
          rows = raw;
          renderStats();
          applyFilters();
          $("[data-refreshed]").textContent = "갱신 " + dtf.format(new Date());
        } catch (e) {
          console.error(e);
          const el = $("[data-error]"); el.classList.remove("hidden");
          el.textContent = e.code === "permission-denied"
            ? "이 계정은 명단을 조회할 권한이 없습니다."
            : "명단을 불러오지 못했습니다. 잠시 후 새로고침해 주세요.";
          $("[data-tbody]").innerHTML = "";
        }
      }

      function renderStats() {
        const latest = rows.filter((r) => r.isLatest);
        const att = latest.filter((r) => r.status === "attending");
        const dec = latest.filter((r) => r.status === "not_attending");
        const sum = (arr) => arr.reduce((s, r) => s + (Number(r.party) || 0), 0);
        const dupResp = rows.filter((r) => r.dupGroupSize > 1).length;
        const cards = [
          { label: "전체 응답 건수", value: rows.length },
          { label: "참석 응답", value: att.length, cls: "accent" },
          { label: "불참 응답", value: dec.length },
          { label: "예상 총 참석 인원", value: sum(att), cls: "accent" },
          { label: "신랑측 예상 인원", value: sum(att.filter((r) => r.side === "groom")), cls: "blue" },
          { label: "신부측 예상 인원", value: sum(att.filter((r) => r.side === "bride")), cls: "blue" },
          { label: "중복 가능 응답", value: dupResp, cls: "warn" },
        ];
        $("[data-cards]").innerHTML = cards.map((c) => `<div class="stat ${c.cls || ""}"><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`).join("");
      }

      function currentFilterRows() {
        const st = $("[data-f-status]").value, sd = $("[data-f-side]").value;
        const nm = $("[data-f-name]").value.trim().toLowerCase();
        const ph = $("[data-f-phone]").value.trim();
        const latestOnly = $("[data-f-latest]").checked, dupOnly = $("[data-f-dup]").checked;
        return rows.filter((r) => {
          if (st && r.status !== st) return false;
          if (sd && r.side !== sd) return false;
          if (latestOnly && !r.isLatest) return false;
          if (dupOnly && !(r.dupGroupSize > 1)) return false;
          if (ph && !normPhone(r.phone).endsWith(ph)) return false;
          if (nm) {
            const hay = (r.name + " " + r.attendees.join(" ")).toLowerCase();
            if (!hay.includes(nm)) return false;
          }
          return true;
        });
      }

      function statusBadge(r) { return r.status === "attending" ? '<span class="badge att">참석</span>' : '<span class="badge dec">불참</span>'; }
      function sideBadge(r) { return r.side === "groom" ? '<span class="badge groom">신랑측</span>' : '<span class="badge bride">신부측</span>'; }
      function stateBadges(r) {
        let b = r.isLatest ? '<span class="badge latest">최신</span>' : '<span class="badge old">이전</span>';
        if (r.dupGroupSize > 1) b += ' <span class="badge dup">중복 가능</span>';
        return b;
      }
      function phoneCell(r) {
        const shown = revealed.has(r.id);
        const val = shown ? fmtPhone(r.phone) : maskPhone(r.phone);
        return `<span class="phone-cell"><span data-ph="${r.id}">${esc(val)}</span> <button class="link reveal" data-toggle-ph="${r.id}">${shown ? "숨기기" : "보기"}</button></span>`;
      }
      function msgCell(r) {
        if (!r.message) return "-";
        const short = r.message.length > 24 ? esc(r.message.slice(0, 24)) + "…" : esc(r.message);
        if (r.message.length <= 24) return `<span>${short}</span>`;
        return `<span class="msg"><span class="short">${short} <button class="link" data-toggle-msg>더보기</button></span><span class="full">${esc(r.message)}</span></span>`;
      }

      function applyFilters() {
        const list = currentFilterRows();
        $("[data-count]").textContent = `표시 ${list.length}건 / 전체 ${rows.length}건`;
        const empty = list.length === 0;
        $("[data-empty]").classList.toggle("hidden", !empty);
        // 데스크톱 표
        $("[data-tbody]").innerHTML = list.map((r) => `<tr class="${r.isLatest ? "" : "stale"}">
          <td>${esc(fmtDate(r.created))}</td>
          <td>${statusBadge(r)}</td>
          <td>${sideBadge(r)}</td>
          <td>${esc(r.name)}</td>
          <td>${phoneCell(r)}</td>
          <td>${r.status === "attending" ? r.party + "명" : "-"}</td>
          <td>${r.attendees.length ? esc(r.attendees.join(", ")) : "-"}</td>
          <td>${msgCell(r)}</td>
          <td>${stateBadges(r)}</td>
        </tr>`).join("");
        // 모바일 카드
        $("[data-mobile]").innerHTML = list.map((r) => `<div class="rc ${r.isLatest ? "" : "stale"}">
          <div class="rc-head">${statusBadge(r)} ${sideBadge(r)} ${stateBadges(r)}</div>
          <div class="rc-line"><span class="rc-k">대표자</span> ${esc(r.name)}</div>
          <div class="rc-line"><span class="rc-k">연락처</span> ${phoneCell(r)}</div>
          <div class="rc-line"><span class="rc-k">인원</span> ${r.status === "attending" ? r.party + "명" : "-"}</div>
          <div class="rc-line"><span class="rc-k">참석자</span> ${r.attendees.length ? esc(r.attendees.join(", ")) : "-"}</div>
          <div class="rc-line"><span class="rc-k">전달</span> ${r.message ? esc(r.message) : "-"}</div>
          <div class="rc-line"><span class="rc-k">일시</span> ${esc(fmtDate(r.created))}</div>
        </div>`).join("");
      }

      function downloadCsv() {
        if (!confirm("이 파일에는 이름과 연락처가 포함되어 있습니다. 안전한 장소에 보관해 주세요.\n계속할까요?")) return;
        const list = currentFilterRows();
        const head = ["submitted_at", "status", "side", "respondent_name", "phone", "party_size", "attendee_names", "message", "is_latest", "duplicate_group"];
        const q = (v) => '"' + String(v == null ? "" : v).replace(/"/g, '""') + '"';
        const lines = [head.join(",")];
        list.forEach((r) => lines.push([
          q(r.created ? r.created.toISOString() : ""), q(r.status), q(r.side), q(r.name),
          q("=\"" + normPhone(r.phone) + "\""), q(r.party), q(r.attendees.join(" / ")),
          q(r.message.replace(/[\r\n]+/g, " ")), q(r.isLatest ? "latest" : "old"),
          q(r.dupGroupSize > 1 ? r.dupKey : ""),
        ].join(",")));
        const blob = new Blob(["﻿" + lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
        const d = new Date();
        const p = (n) => String(n).padStart(2, "0");
        const fn = `wedding-attendance-${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}.csv`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = fn; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }

      // 이벤트
      $("[data-login]").addEventListener("click", doLogin);
      $("[data-logout]").addEventListener("click", () => authMod.signOut(auth));
      $("[data-logout2]").addEventListener("click", () => authMod.signOut(auth));
      $("[data-refresh]").addEventListener("click", loadData);
      $("[data-csv]").addEventListener("click", downloadCsv);
      ["[data-f-status]", "[data-f-side]", "[data-f-latest]", "[data-f-dup]"].forEach((s) => $(s).addEventListener("change", applyFilters));
      ["[data-f-name]", "[data-f-phone]"].forEach((s) => $(s).addEventListener("input", applyFilters));
      document.addEventListener("click", (e) => {
        const tp = e.target.closest("[data-toggle-ph]");
        if (tp) { const id = tp.dataset.togglePh; revealed.has(id) ? revealed.delete(id) : revealed.add(id); applyFilters(); return; }
        const tm = e.target.closest("[data-toggle-msg]");
        if (tm) { tm.closest(".msg").classList.add("open"); }
      });

      (async () => {
        try { await initFirebase(); } catch (e) { console.error(e); show("login"); $("[data-login-err]").textContent = "초기화에 실패했습니다."; $("[data-login-err]").classList.remove("hidden"); return; }
        authMod.onAuthStateChanged(auth, (user) => {
          revealed.clear(); // 로그아웃/전환 시 연락처 보기 초기화
          if (!user) { show("login"); return; }
          if (!isAllowed(user)) {
            $("[data-denied-msg]").textContent = `허용된 관리자 계정이 아닙니다. (${user.email || "알 수 없음"})`;
            show("denied");
            return;
          }
          $("[data-who]").textContent = user.email;
          loadData();
        });
      })();
    </script>
  </body>
</html>
